---
# Source: consul/templates/terminating-gateways-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-consul-gateway1
  namespace: default
  labels:
    app: consul
    chart: consul-helm
    heritage: Helm
    release: release-name
    component: terminating-gateway
    terminating-gateway-name: release-name-consul-gateway1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consul
      chart: consul-helm
      heritage: Helm
      release: release-name
      component: terminating-gateway
      terminating-gateway-name: release-name-consul-gateway1
  template:
    metadata:
      labels:
        app: consul
        chart: consul-helm
        heritage: Helm
        release: release-name
        component: terminating-gateway
        terminating-gateway-name: release-name-consul-gateway1
        consul.hashicorp.com/connect-inject-managed-by: consul-k8s-endpoints-controller
      annotations:
        "consul.hashicorp.com/connect-inject": "false"
        "consul.hashicorp.com/mesh-inject": "false"
        "consul.hashicorp.com/gateway-kind": "terminating-gateway"
        "consul.hashicorp.com/gateway-consul-service-name": "gateway1"
    spec:
      terminationGracePeriodSeconds: 10
      serviceAccountName: release-name-consul-gateway1
      volumes:
        - name: tmp
          emptyDir:
            medium: "Memory"
        - name: consul-service
          emptyDir:
            medium: "Memory"
      initContainers:
        # terminating-gateway-init registers the terminating gateway service with Consul.
        - name: terminating-gateway-init
          image: docker.mirror.hashicorp.services/hashicorppreview/consul-k8s-control-plane:1.8.13-dev
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 100
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CONSUL_ADDRESSES
              value: release-name-consul-server.default.svc
            - name: CONSUL_GRPC_PORT
              value: "8502"
            - name: CONSUL_HTTP_PORT
              value: "8500"
            - name: CONSUL_DATACENTER
              value: dc1
            - name: CONSUL_API_TIMEOUT
              value: 5s
            - name: CONSUL_NODE_NAME
              value: $(NODE_NAME)-virtual
          command:
            - "/bin/sh"
            - "-ec"
            - |
              exec consul-k8s-control-plane connect-init -pod-name=${POD_NAME} -pod-namespace=${NAMESPACE} \
                  -gateway-kind="terminating-gateway" \
                  -proxy-id-file=/consul/service/proxy-id \
                  -service-name=gateway1 \
                  -log-level=info \
                  -log-json=false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: consul-service
              mountPath: /consul/service
          resources:
            requests:
              memory: "50Mi"
              cpu: "50m"
            limits:
              memory: "50Mi"
              cpu: "50m"
      containers:
        - name: terminating-gateway
          image: "docker.mirror.hashicorp.services/hashicorppreview/consul-dataplane:1.8-dev"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 100
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: consul-service
              mountPath: /consul/service
              readOnly: true
          resources:
            limits:
              cpu: gwcpu2
              memory: gwmemory2
            requests:
              cpu: gwcpu
              memory: gwmemory
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DP_CREDENTIAL_LOGIN_META1
              value: pod=$(NAMESPACE)/$(POD_NAME)
            - name: DP_CREDENTIAL_LOGIN_META2
              value: component=terminating-gateway
            - name: DP_SERVICE_NODE_NAME
              value: $(NODE_NAME)-virtual
            - name: DP_ENVOY_READY_BIND_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          command:
            - consul-dataplane
          args:
            - -addresses=release-name-consul-server.default.svc
            - -grpc-port=8502
            - -proxy-service-id-path=/consul/service/proxy-id
            - -tls-disabled
            - -log-level=info
            - -log-json=false
          livenessProbe:
            tcpSocket:
              port: 8443
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8443
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          ports:
            - name: gateway
              containerPort: 8443
0:
  spec:
    template:
      spec:
        containers:
          - resources: null
