{{- if (and .Values.connectInject.enabled .Values.global.generateManifests) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ template "consul.fullname" . }}-apply-manifests-in-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "consul.name" . }}
    chart: {{ template "consul.chart" . }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
    component: generate-manifests-apply
    {{- if .Values.global.extraLabels }}
      {{- toYaml .Values.global.extraLabels | nindent 4 }}
    {{- end }}
  annotations:
    "helm.sh/hook": post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      name: {{ template "consul.fullname" . }}-apply
      labels:
        app: {{ template "consul.name" . }}
        chart: {{ template "consul.chart" . }}
        release: {{ .Release.Name }}
        component: generate-manifests-apply
        {{- if .Values.global.extraLabels }}
          {{- toYaml .Values.global.extraLabels | nindent 8 }}
        {{- end }}
      annotations:
        "consul.hashicorp.com/connect-inject": "false"
        "consul.hashicorp.com/mesh-inject": "false"
        {{- if .Values.global.openshift.enabled }}
        "openshift.io/scc": "restricted-v2"
        {{- end }}
        
    spec:
      restartPolicy: Never
      serviceAccountName: {{ template "consul.fullname" . }}-apply-sa
      {{- if not .Values.global.openshift.enabled }}
      containers:
      - name: apply
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Apply manifests in the PVC using kubectl"
            kubectl apply -R -f /consul/config/gatewayapi
            if [ -d "/consul/config/consulapi" ]; then
              echo "Applying Consul API manifests"
              kubectl apply -R -f /consul/config/consulapi
              echo "Applying Consul service intentions"
              kubectl replace -R -f /consul/config/serviceintentions 
            fi
            echo "Done"
        volumeMounts:
          - name: gatewayapi-pvc
            mountPath: /consul/config/
      {{- else }}
      containers:
      - name: apply
        image: registry.redhat.io/openshift4/ose-cli
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Applying manifests using oc"
            oc apply -R -f /consul/config
            if [ -d "/consul/config/consulapi" ]; then
              echo "Applying Consul API manifests"
              oc apply -R -f /consul/config/consulapi
              echo "Applying Consul service intentions"
              oc replace -R -f /consul/config/serviceintentions 
            fi
            echo "Done"
        volumeMounts:
          - name: gatewayapi-pvc
            mountPath: /consul/config/
      {{- end }}


      volumes:
        - name: gatewayapi-pvc
          persistentVolumeClaim:
            claimName: {{ template "consul.fullname" . }}-gatewayapi-pvc
{{- end }}
