{{- if .Values.connectInject.enabled }}
{{- if (and .Values.global.enterpriseLicense.secretName .Values.global.enterpriseLicense.secretKey) }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  labels:
    app: {{ template "consul.name" . }}
    chart: {{ template "consul.chart" . }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
    component: crd
  name: routeextprocs.consul.hashicorp.com
spec:
  group: consul.hashicorp.com
  names:
    kind: RouteExtProc
    listKind: RouteExtProcList
    plural: routeextprocs
    singular: routeextproc
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The sync status of the resource with Consul
      jsonPath: .status.conditions[?(@.type=="Synced")].status
      name: Synced
      type: string
    - description: The last successful synced time of the resource with Consul
      jsonPath: .status.lastSyncedTime
      name: Last Synced
      type: date
    - description: The age of the resource
      jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RouteExtProc is the Schema for the routeextprocs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RouteExtProcSpec defines the desired state of RouteExtProc.
            properties:
              mode:
                description: |-
                  Mode controls the behavior applied to the targeted ext-proc instance on this route.
                    "disabled" -> skip this ext_proc instance for requests matching this route
                    "enabled"  -> force-enable this instance on the route
                    "override" -> keep this instance on the route but apply Overrides
                enum:
                - enabled
                - disabled
                - override
                type: string
              overrides:
                description: |-
                  Overrides is honored only when Mode is "override". It applies per-route
                  ext_proc overrides materialized as an Envoy ExtProcPerRoute override.
                properties:
                #   failureModeAllow:
                #     description: |-
                #       FailureModeAllow controls whether the request proceeds when the processor is
                #       unreachable or errors.
                #     type: boolean
                #   messageTimeout:
                #     description: MessageTimeout bounds how long Envoy waits for a response
                #       from the processor.
                #     type: string
                  processing:
                    description: Processing controls which phases of the request/response
                      lifecycle are intercepted.
                    properties:
                      request:
                        description: RouteExtProcProcessingDirection configures processing
                          modes for one direction.
                        properties:
                          bodyMode:
                            description: BodyMode controls whether and how the body
                              is sent to the processor.
                            enum:
                            - SKIP
                            - BUFFERED
                            - BUFFERED_PARTIAL
                            - STREAMED
                            type: string
                          headersMode:
                            description: HeadersMode controls whether request/response
                              headers are sent to the processor.
                            enum:
                            - SEND
                            - SKIP
                            type: string
                          maxBodyBytes:
                            description: MaxBodyBytes is the max bytes buffered when
                              BodyMode is BUFFERED/BUFFERED_PARTIAL.
                            format: int64
                            type: integer
                          trailersMode:
                            description: TrailersMode controls whether trailers are
                              sent to the processor.
                            enum:
                            - SEND
                            - SKIP
                            type: string
                        type: object
                      response:
                        description: RouteExtProcProcessingDirection configures processing
                          modes for one direction.
                        properties:
                          bodyMode:
                            description: BodyMode controls whether and how the body
                              is sent to the processor.
                            enum:
                            - SKIP
                            - BUFFERED
                            - BUFFERED_PARTIAL
                            - STREAMED
                            type: string
                          headersMode:
                            description: HeadersMode controls whether request/response
                              headers are sent to the processor.
                            enum:
                            - SEND
                            - SKIP
                            type: string
                          maxBodyBytes:
                            description: MaxBodyBytes is the max bytes buffered when
                              BodyMode is BUFFERED/BUFFERED_PARTIAL.
                            format: int64
                            type: integer
                          trailersMode:
                            description: TrailersMode controls whether trailers are
                              sent to the processor.
                            enum:
                            - SEND
                            - SKIP
                            type: string
                        type: object
                    type: object
                type: object
              statPrefix:
                description: |-
                  StatPrefix selects which attached builtin/ext-proc instance this filter targets.
                  It must match the StatPrefix of a builtin/ext-proc extension on the gateway's
                  service-defaults. Omit to target the default (unnamed) instance whose filter
                  name is "envoy.filters.http.ext_proc".
                type: string
            required:
            - mode
            type: object
          status:
            properties:
              conditions:
                description: Conditions indicate the latest available observations
                  of a resource's current state.
                items:
                  description: |-
                    Conditions define a readiness condition for a Consul resource.
                    See: https://github.com/kubernetes/community/blob/master/contributors/devel/sig-architecture/api-conventions.md#typical-status-properties
                  properties:
                    lastTransitionTime:
                      description: LastTransitionTime is the last time the condition
                        transitioned from one status to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type of condition.
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              lastSyncedTime:
                description: LastSyncedTime is the last time the resource successfully
                  synced with Consul.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
{{- end }}
