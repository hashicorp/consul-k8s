{{- if .Values.connectInject.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ template "consul.fullname" . }}-delete-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "consul.name" . }}
    chart: {{ template "consul.chart" . }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
    component: generate-manifests-pvc-cleaner
    {{- if .Values.global.extraLabels }}
      {{- toYaml .Values.global.extraLabels | nindent 4 }}
    {{- end }}
  annotations:
    "helm.sh/hook": post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      name: {{ template "consul.fullname" . }}-pvc-cleaner
      labels:
        app: {{ template "consul.name" . }}
        chart: {{ template "consul.chart" . }}
        release: {{ .Release.Name }}
        component: generate-manifests-pvc-cleaner
        {{- if .Values.global.extraLabels }}
          {{- toYaml .Values.global.extraLabels | nindent 8 }}
        {{- end }}
      annotations:
        "consul.hashicorp.com/connect-inject": "false"
        "consul.hashicorp.com/mesh-inject": "false"
        {{- if .Values.global.openshift.enabled }}
        "openshift.io/scc": "restricted-v2"
        {{- end }}
        
    spec:
      restartPolicy: Never
      serviceAccountName: {{ template "consul.fullname" . }}-pvc-cleaner-sa
      {{- if not .Values.global.openshift.enabled }}
      containers:
      - name: pvc-cleaner
        image: bitnami/kubectl:1.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Apply manifests in the PVC using oc"
            kubectl apply -R -f /consul/config/gatewayapi/
            echo "Done"
        volumeMounts:
          - name: gatewayapi-pvc
            mountPath: /consul/config/gatewayapi
      {{- else }}
      containers:
      - name: pvc-cleaner
        image: registry.redhat.io/openshift4/ose-cli
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Applying manifests using oc"
            oc apply -R -f /consul/config/gatewayapi/
            echo "Done"
        volumeMounts:
          - name: gatewayapi-pvc
            mountPath: /consul/config/gatewayapi
      {{- end }}


      volumes:
        - name: gatewayapi-pvc
          persistentVolumeClaim:
            claimName: {{ template "consul.fullname" . }}-gatewayapi-pvc
{{- end }}
