{{- if .Values.terminatingGateways.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: helm-values
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "consul.name" . }}
    chart: {{ template "consul.chart" . }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
    component: terminating-gateway
data:
  values.json: |
    {
      "fullnameOverride": {{ .Values.fullnameOverride | default "" | quote }},
      "nameOverride": {{ .Values.nameOverride | default "" | quote }},

      "release": {
        "name": {{ .Release.Name | quote }},
        "namespace": {{ .Release.Namespace | quote }},
        "service": {{ .Release.Service | quote }}
      },

      "global": {
        "name": {{ .Values.global.name | default "" | quote }},
        "enabled": {{ .Values.global.enabled | default true | toJson }},
        "logLevel": {{ .Values.global.logLevel | default "info" | quote }},
        "logJSON": {{ .Values.global.logJSON | default false | toJson }},
        "datacenter": {{ .Values.global.datacenter | default "dc1" | quote }},
        "enableConsulNamespaces": {{ .Values.global.enableConsulNamespaces | default false | toJson }},

        "adminPartitions": {
          "enabled": {{ .Values.global.adminPartitions.enabled | default false | toJson }},
          "name": {{ .Values.global.adminPartitions.name | default "default" | quote }}
        },

        "tls": {
          "enabled": {{ .Values.global.tls.enabled | default false | toJson }},
          "caCert": {
            "secretName": {{ .Values.global.tls.caCert.secretName | default "" | quote }}
          }
        },

        "acls": {
          "manageSystemACLs": {{ .Values.global.acls.manageSystemACLs | default false | toJson }}
        },

        "secretsBackend": {
          "vault": {
            "enabled": {{ .Values.global.secretsBackend.vault.enabled | default false | toJson }},
            "consulCARole": {{ .Values.global.secretsBackend.vault.consulCARole | default "" | quote }},
            "ca": {
              "secretName": {{ .Values.global.secretsBackend.vault.ca.secretName | default "" | quote }},
              "secretKey": {{ .Values.global.secretsBackend.vault.ca.secretKey | default "" | quote }}
            },
            "agentAnnotations": {{ .Values.global.secretsBackend.vault.agentAnnotations | default dict | toJson }}
          }
        },

        "metrics": {
          "enabled": {{ .Values.global.metrics.enabled | default false | toJson }},
          "enableGatewayMetrics": {{ .Values.global.metrics.enableGatewayMetrics | default false | toJson }}
        },

        "imageK8S": {{ .Values.global.imageK8S | default "" | quote }},
        "imageConsulDataplane": {{ .Values.global.imageConsulDataplane | default "" | quote }},
        "extraLabels": {{ .Values.global.extraLabels | default dict | toJson }},
        "consulAPITimeout": {{ .Values.global.consulAPITimeout | default "10s" | quote }},
        "imagePullPolicy": {{ .Values.global.imagePullPolicy | default "IfNotPresent" | quote }},
        "enablePodSecurityPolicies": {{ .Values.global.enablePodSecurityPolicies | default false | toJson }},
        "openShiftEnabled": {{ .Values.global.openshift.enabled | default false | toJson }}
      },

      "terminatingGateways": {
        "enabled": {{ .Values.terminatingGateways.enabled | toJson }},
        "logLevel": {{ .Values.terminatingGateways.logLevel | default "" | quote }},
        "defaults": {
          "replicas": {{ .Values.terminatingGateways.defaults.replicas | default 1 }},
          "consulNamespace": {{ .Values.terminatingGateways.defaults.consulNamespace | default "default" | quote }},
          "annotations": {{ .Values.terminatingGateways.defaults.annotations | default dict | toJson }}
        }
      },

      "externalServers": {
        "enabled": {{ .Values.externalServers.enabled | default false | toJson }},
        "hosts": {{ .Values.externalServers.hosts | default list | toJson }},
        "httpsPort": {{ .Values.externalServers.httpsPort | default 443 }},
        "grpcPort": {{ .Values.externalServers.grpcPort | default 8502 }},
        "tlsServerName": {{ .Values.externalServers.tlsServerName | default "" | quote }},
        "useSystemRoots": {{ .Values.externalServers.useSystemRoots | default false | toJson }},
        "skipServerWatch": {{ .Values.externalServers.skipServerWatch | default false | toJson }}
      }
    }
{{- end }}



