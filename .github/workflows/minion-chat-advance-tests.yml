# Unified workflow to trigger minion-chat-advance setups and run tests
name: minion-chat-advance-tests

on:
  workflow_dispatch:
    inputs:
      setup_name:
        description: 'Setup to run (or "all" for all setups)'
        required: true
        type: choice
        options:
          - all
          - 4-consul-dual-stack-mesh-mgw
          - 5-consul-dual-stack-apigw-1.22
          - 3-consul-ipv6-dual-stack-sd
          - 5-terminating-dual-stack-setup
        default: 'all'
      minion_chat_branch:
        description: 'Branch to use from minion-chat-advance'
        required: false
        default: 'main'
      consul_k8s_branch:
        description: 'Branch to use from consul-k8s'
        required: false
        default: 'main'
      aws_region:
        description: 'AWS region for deployment'
        required: false
        default: 'us-west-2'
  schedule:
    # Run all setups weekly on Sundays at 2AM UTC
    - cron: '0 2 * * 0'

env:
  MINION_CHAT_REPO: "hashi-stack/minion-chat-advance"
  MINION_CHAT_BRANCH: ${{ github.event.inputs.minion_chat_branch || 'main' }}
  CONSUL_K8S_BRANCH: ${{ github.event.inputs.consul_k8s_branch || github.ref_name }}
  AWS_REGION: ${{ github.event.inputs.aws_region || 'us-west-2' }}

jobs:
  setup-matrix:
    name: Determine setups to run
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ github.event.inputs.setup_name }}" == "all" ] || [ -z "${{ github.event.inputs.setup_name }}" ]; then
            echo 'matrix=["4-consul-dual-stack-mesh-mgw","5-consul-dual-stack-apigw-1.22","3-consul-ipv6-dual-stack-sd","5-terminating-dual-stack-setup"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.setup_name }}"]' >> $GITHUB_OUTPUT
          fi

  run-setup-and-test:
    name: ${{ matrix.setup }}
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        setup: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Checkout minion-chat-advance
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MINION_CHAT_REPO }}
          ref: ${{ env.MINION_CHAT_BRANCH }}
          token: ${{ secrets.ELEVATED_GITHUB_TOKEN }}
          path: minion-chat-advance

      - name: Checkout consul-k8s
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ env.CONSUL_K8S_BRANCH }}
          token: ${{ secrets.ELEVATED_GITHUB_TOKEN }}
          path: consul-k8s

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update

      - name: Setup EKS cluster
        id: setup-eks
        run: |
          CLUSTER_NAME="minion-chat-${{ matrix.setup }}-${{ github.run_id }}"
          echo "CLUSTER_NAME=${CLUSTER_NAME}" >> $GITHUB_ENV
          echo "cluster_name=${CLUSTER_NAME}" >> $GITHUB_OUTPUT
          
          # Create EKS cluster (adjust parameters as needed)
          eksctl create cluster \
            --name ${CLUSTER_NAME} \
            --region ${{ env.AWS_REGION }} \
            --nodegroup-name standard-workers \
            --node-type t3.medium \
            --nodes 3 \
            --nodes-min 1 \
            --nodes-max 4 \
            --managed \
            --version 1.28
          
          # Update kubeconfig
          aws eks update-kubeconfig --name ${CLUSTER_NAME} --region ${{ env.AWS_REGION }}

      - name: Verify cluster access
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Run setup script
        id: run-setup
        working-directory: minion-chat-advance
        run: |
          SETUP_DIR="${{ matrix.setup }}"
          echo "Running setup for: ${SETUP_DIR}"
          
          if [ -f "${SETUP_DIR}/setup.sh" ]; then
            chmod +x "${SETUP_DIR}/setup.sh"
            cd "${SETUP_DIR}"
            ./setup.sh
          elif [ -f "${SETUP_DIR}/README.md" ]; then
            echo "::warning::Setup script not found for ${SETUP_DIR}, check README.md for manual steps"
            cat "${SETUP_DIR}/README.md"
            exit 1
          else
            echo "::error::Setup directory ${SETUP_DIR} not found or missing setup.sh"
            exit 1
          fi

      - name: Wait for deployment stabilization
        run: |
          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=ready pod --all -n consul --timeout=300s || true
          kubectl get pods -A

      - name: Run tests
        id: run-tests
        working-directory: minion-chat-advance
        continue-on-error: true
        run: |
          SETUP_DIR="${{ matrix.setup }}"
          
          if [ -f "${SETUP_DIR}/test.sh" ]; then
            chmod +x "${SETUP_DIR}/test.sh"
            cd "${SETUP_DIR}"
            ./test.sh
            TEST_EXIT_CODE=$?
            echo "test_exit_code=${TEST_EXIT_CODE}" >> $GITHUB_OUTPUT
            exit ${TEST_EXIT_CODE}
          else
            echo "::warning::No test.sh found for ${SETUP_DIR}"
            echo "test_exit_code=0" >> $GITHUB_OUTPUT
          fi

      - name: Collect diagnostic information
        if: always()
        run: |
          echo "=== Cluster Info ==="
          kubectl cluster-info
          
          echo "=== All Pods ==="
          kubectl get pods -A -o wide
          
          echo "=== All Services ==="
          kubectl get svc -A
          
          echo "=== Consul Pods Logs ==="
          kubectl logs -n consul --all-containers=true --tail=200 || true
          
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -50

      - name: Update commit status
        if: always()
        uses: docker://ghcr.io/curtbushko/commit-status-action:e1d661c757934ab35c74210b4b70c44099ec747a
        env:
          INPUT_TOKEN: ${{ secrets.ELEVATED_GITHUB_TOKEN }}
          INPUT_REPOSITORY: ${{ github.repository }}
          INPUT_CONTEXT: "minion-chat-test: ${{ matrix.setup }}"
          INPUT_STATE: ${{ steps.run-tests.outputs.test_exit_code == '0' && 'success' || 'failure' }}
          INPUT_DESCRIPTION: ${{ steps.run-tests.outputs.test_exit_code == '0' && 'Tests passed' || 'Tests failed' }}
          INPUT_SHA: ${{ github.sha }}
          INPUT_DETAILS_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          INPUT_OWNER: "hashicorp"

      - name: Cleanup EKS cluster
        if: always()
        run: |
          if [ -n "${{ env.CLUSTER_NAME }}" ]; then
            echo "Cleaning up EKS cluster: ${{ env.CLUSTER_NAME }}"
            eksctl delete cluster --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }} --wait || true
          fi

      - name: Fail job if tests failed
        if: steps.run-tests.outputs.test_exit_code != '0'
        run: |
          echo "::error::Tests failed for ${{ matrix.setup }}"
          exit 1

  summary:
    name: Test Summary
    needs: run-setup-and-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          echo "All setup tests completed"
          if [ "${{ needs.run-setup-and-test.result }}" == "failure" ]; then
            echo "::error::One or more setup tests failed"
            exit 1
          fi

