# Dispatch to the consul-k8s-workflows when a PR is created and on merges to main/release*
name: cloud
on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
      - "release/**"

# these should be the only settings that you will ever need to change
env:
  BRANCH: ${{ github.head_ref || github.ref_name }}
  CONTEXT: "cloud"
  SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  cloud:
    name: cloud
    runs-on: ubuntu-latest
    steps:
    - uses: benc-uk/workflow-dispatch@25b02cc069be46d637e8fe2f1e8484008e9e9609 # v1.2.3
      name: cloud
      with:
        workflow: cloud.yml
        repo: hashicorp/consul-k8s-workflows
        ref: shashank/ocp-compatibility-tests
        token: ${{ secrets.ELEVATED_GITHUB_TOKEN }}
        inputs: '{ "context":"${{ env.CONTEXT }}", "repository":"${{ github.repository }}", "branch":"${{ env.BRANCH }}", "sha":"${{ github.sha }}" }'
