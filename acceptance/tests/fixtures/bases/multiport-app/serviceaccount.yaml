# The `secrets` field links each ServiceAccount to its service-account-token
# Secret (defined in secret.yaml). On OpenShift, the service account controller
# automatically adds a `<sa>-dockercfg-xxxxx` image-pull Secret to the SA's
# `secrets` list. The connect-inject webhook mounts `sa.Secrets[0]` as the
# per-service ACL login token for multi-port pods, so without this explicit
# linkage the dockercfg Secret (which has no `token` key) would be selected and
# the `consul-connect-inject-init-<svc>` init container would crash-loop with
# `open /consul/serviceaccount-<svc>/token: no such file or directory`. Listing
# the token Secret first keeps it at index 0 (OpenShift appends dockercfg after).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: multiport
secrets:
  - name: multiport
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: multiport-admin
secrets:
  - name: multiport-admin
