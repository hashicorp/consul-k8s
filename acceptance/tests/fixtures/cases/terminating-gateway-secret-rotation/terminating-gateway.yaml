apiVersion: consul.hashicorp.com/v1alpha1
kind: TerminatingGateway
metadata:
  name: tg
spec:
  services:
  - name: external-server
    caFile: /consul/userconfig/tg-client-tls/ca.crt
    certFile: /consul/userconfig/tg-client-tls/client.crt
    keyFile: /consul/userconfig/tg-client-tls/client.key
    secretRef:
      name: tg-client-tls

