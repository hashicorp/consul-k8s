# This patch enables connect-inject with transparent proxy AND configures an
# explicit upstream listener on localhost:1234. The explicit upstream is used
# by the proxy lifecycle shutdown test to verify Envoy drain behavior without
# depending on iptables/ip6tables transparent-proxy redirect rules, which are
# not guaranteed to remain in place during pod termination.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-client
spec:
  template:
    metadata:
      annotations:
        "consul.hashicorp.com/connect-inject": "true"
        "consul.hashicorp.com/connect-service-upstreams": "static-server:1234"
