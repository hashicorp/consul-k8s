# This fixture is for OpenShift WITH CNI enabled and transparent proxy.
# It includes the k8s.v1.cni.cncf.io/networks annotation required by Multus.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-client
spec:
  template:
    metadata:
      annotations:
        "consul.hashicorp.com/connect-inject": "true"
        "k8s.v1.cni.cncf.io/networks": '[{ "name":"consul-cni" }]'
