# This fixture is for OpenShift WITHOUT CNI enabled and transparent proxy.
# For OpenShift WITH CNI, use static-client-openshift-tproxy-cni instead.
# Note: The previous version incorrectly included CNI annotations.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-client
spec:
  template:
    metadata:
      annotations:
        "consul.hashicorp.com/connect-inject": "true"

