apiVersion: consul.hashicorp.com/v1beta1
kind: HTTPRoute
metadata:
  name: custom-http-route
spec:
  parentRefs:
  - name: custom-gateway
    sectionName: custom-http
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: "/v1"
      backendRefs:
      - name: static-server
        port: 8080
