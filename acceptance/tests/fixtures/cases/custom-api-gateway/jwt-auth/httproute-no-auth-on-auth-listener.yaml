apiVersion: consul.hashicorp.com/v1beta1
kind: HTTPRoute
metadata:
  name: custom-http-route-no-auth-on-auth-listener
spec:
  parentRefs:
  - name: custom-gateway
    sectionName: custom-http-auth
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: "/admin-no-auth"
      backendRefs:
        - name: static-server
          port: 8080
    - matches:
      - path:
          type: PathPrefix
          value: "/pet-no-auth"
      backendRefs:
        - name: static-server
          port: 8080
