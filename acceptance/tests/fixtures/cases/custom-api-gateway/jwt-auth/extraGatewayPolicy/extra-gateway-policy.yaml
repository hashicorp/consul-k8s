# This is used to show that a gateway cannot have more than one gateway policy attached to it
apiVersion: consul.hashicorp.com/v1alpha1
kind: GatewayPolicy
metadata:
  name: custom-bad-policy
spec:
  targetRef:
    name: custom-gateway
    sectionName: custom-http-auth
    group: consul.hashicorp.com/v1beta1
    kind: Gateway
  override:
    jwt:
      providers:
      - name: "local"
  default:
    jwt:
      providers:
      - name: "local"
        verifyClaims:
        - path:
            - role
          value: pet
