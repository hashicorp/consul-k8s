apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  labels:
    component: api-gateway
spec:
  gatewayClassName: consul
  listeners:
  - protocol: HTTPS
    port: 8080
    name: https
    tls:
      certificateRefs:
      - name: "certificate"
        namespace: "default"
    allowedRoutes:
      namespaces:
        from: "All"
